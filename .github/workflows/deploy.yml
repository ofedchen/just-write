name: Build and Deploy

on:
  push:
    branches:
      - deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE_24: true

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/deploy/justwrite
            docker compose pull justwrite
            docker compose up -d --no-deps justwrite

            echo "Waiting for health check..."
            sleep 10

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://justwrite.olha.dev/api/health)
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Deploy successful! Health check passed."
              echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            else
              echo "Health check failed with status $HTTP_STATUS"
              echo "Rolling back..."
              docker compose logs --tail=50 justwrite
              exit 1
            fi
